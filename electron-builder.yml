appId: com.hasi100.claude-usage-tracker
productName: Claude Usage Tracker

directories:
  output: dist-electron

files:
  - dist/**/*
  - src/main/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  include: null

mac:
  target:
    - target: dmg
      arch: [universal]
    - target: zip
      arch: [universal]
  icon: assets/icon.icns
  category: public.app-category.utilities

linux:
  target:
    - AppImage
